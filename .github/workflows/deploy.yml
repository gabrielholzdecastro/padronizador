name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          # Verifica se há arquivos TypeScript antes de compilar
          if [ -d "src" ] && [ -n "$(find src -name '*.ts' -type f 2>/dev/null)" ]; then
            echo "Compilando arquivos TypeScript..."
            npm run build
          else
            echo "Nenhum arquivo TypeScript encontrado. Pulando o build."
          fi
          # Garante que o diretório dist existe
          mkdir -p dist
          # Cria app.js se não existir (necessário para o index.html)
          if [ ! -f "dist/app.js" ]; then
            echo "// Arquivo JavaScript vazio - adicione seus arquivos TypeScript em src/" > dist/app.js
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


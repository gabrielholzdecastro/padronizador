<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padronizador - Gerador de Mensagens</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    keyframes: {
                        'slide-in-right': {
                            '0%': { transform: 'translateX(100%)', opacity: '0' },
                            '100%': { transform: 'translateX(0)', opacity: '1' }
                        }
                    },
                    animation: {
                        'slide-in-right': 'slide-in-right 0.3s ease-out'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen py-8 px-4">
    <!-- Container de Alertas -->
    <div id="alertContainer" class="fixed top-4 right-4 z-50 space-y-2 max-w-md"></div>
    
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-8 text-center">Padronizador</h1>
        
        <form id="formulario" class="bg-white rounded-lg shadow-md p-6 space-y-6">
            <!-- Botão Limpar Tudo -->
            <div class="flex justify-start">
                <button 
                    type="button" 
                    id="btnLimpar"
                    class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition-colors font-medium shadow-sm hover:shadow-md"
                >
                    🗑️ Limpar tudo
                </button>
            </div>

            <!-- Campo Processo -->
            <div>
                <label for="processo" class="block text-sm font-medium text-gray-700 mb-2">
                    Processo <span class="text-red-500">*</span>
                </label>
                <input 
                    type="text" 
                    id="processo" 
                    name="processo"
                    placeholder="000000/0000"
                    maxlength="11"
                    required
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
                />
                <p class="text-xs text-gray-500 mt-1.5">Formato: 000000/0000</p>
            </div>

            <!-- Campo Script -->
            <div>
                <label for="script" class="block text-sm font-medium text-gray-700 mb-2">
                    Script
                </label>
                <div id="scriptsContainer" class="space-y-2">
                    <div class="flex gap-2">
                        <input 
                            type="text" 
                            name="script"
                            class="flex-1 px-4 py-2.5 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
                        />
                    </div>
                </div>
                <button 
                    type="button" 
                    id="btnAdicionarScript"
                    class="mt-2 px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors text-sm font-medium shadow-sm hover:shadow-md"
                >
                    + Adicionar mais um script
                </button>
            </div>

            <!-- Campo Retrabalho -->
            <div>
                <label class="flex items-center space-x-2">
                    <input 
                        type="checkbox" 
                        id="retrabalho" 
                        name="retrabalho"
                        class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
                    />
                    <span class="text-sm font-medium text-gray-700">Retrabalho</span>
                </label>
            </div>

            <!-- Campo Resumo da Alteração -->
            <div>
                <label for="resumo" class="block text-sm font-medium text-gray-700 mb-2">
                    Resumo da alteração
                </label>
                <div id="resumosContainer" class="space-y-2">
                    <div class="flex gap-2">
                        <select 
                            name="repositorio"
                            class="px-4 py-2.5 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white transition-colors min-w-[200px]"
                        >
                            <option value="">Selecione o repositório</option>
                            <option value="cpe-jdk-basecontabil">cpe-jdk-basecontabil</option>
                            <option value="cpe-jdk-contacorrente">cpe-jdk-contacorrente</option>
                            <option value="cpe-jdk-cpedicionario">cpe-jdk-cpedicionario</option>
                            <option value="cpe-jdk-cpeintegracaorhf">cpe-jdk-cpeintegracaorhf</option>
                            <option value="cpe-jdk-custos">cpe-jdk-custos</option>
                            <option value="cpe-jdk-execucao">cpe-jdk-execucao</option>
                            <option value="cpe-jdk-lrf">cpe-jdk-lrf</option>
                            <option value="cpe-jdk-orcamento">cpe-jdk-orcamento</option>
                            <option value="cpe-jdk-planejamento">cpe-jdk-planejamento</option>
                            <option value="cpe-jdk-prestacaocontas">cpe-jdk-prestacaocontas</option>
                            <option value="cpe-jdk-reinf">cpe-jdk-reinf</option>
                            <option value="cpe-jdk-sicom">cpe-jdk-sicom</option>
                        </select>
                        <input 
                            type="text" 
                            name="resumo"
                            placeholder="Resumo da alteração"
                            class="flex-1 px-4 py-2.5 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
                        />
                    </div>
                </div>
                <button 
                    type="button" 
                    id="btnAdicionarResumo"
                    class="mt-2 px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors text-sm font-medium shadow-sm hover:shadow-md"
                >
                    + Adicionar mais um commit
                </button>
            </div>

            <!-- Campo Detalhe da Alteração -->
            <div>
                <label for="detalhe" class="block text-sm font-medium text-gray-700 mb-2">
                    Detalhe da alteração <span class="text-red-500">*</span>
                </label>
                <textarea 
                    id="detalhe" 
                    name="detalhe"
                    rows="6"
                    required
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors resize-y"
                ></textarea>
            </div>

            <!-- Botão Finalizar -->
            <div class="flex justify-end">
                <button 
                    type="submit" 
                    id="btnFinalizar"
                    class="px-6 py-2.5 bg-green-500 text-white rounded-lg hover:bg-green-600 transition-colors font-medium shadow-md hover:shadow-lg"
                >
                    ✓ Finalizar
                </button>
            </div>
        </form>
    </div>

    <!-- Modal de Resultados -->
    <div 
        id="modal" 
        class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 transition-opacity"
    >
        <div class="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto transform transition-all">
            <div class="p-6">
                <div class="flex justify-end items-center mb-6 border-b border-gray-200 pb-4">
                    <button 
                        id="btnFecharModal"
                        class="text-gray-400 hover:text-gray-600 text-3xl font-bold leading-none transition-colors"
                        aria-label="Fechar"
                    >
                        ×
                    </button>
                </div>

                <!-- Mensagens de Commit -->
                <div id="commitsContainer" class="mb-6 space-y-4">
                    <!-- Mensagens de commit serão inseridas aqui dinamicamente -->
                </div>

                <!-- Mensagem de Encaminhamento -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-medium text-gray-700">
                            Mensagem de encaminhamento de protocolo
                        </label>
                        <button 
                            id="btnCopiarEncaminhamento"
                            class="px-4 py-2 bg-blue-500 text-white text-sm rounded-lg hover:bg-blue-600 transition-colors font-medium shadow-sm hover:shadow-md flex items-center gap-1"
                        >
                            📋 Copiar
                        </button>
                    </div>
                    <textarea 
                        id="mensagemEncaminhamento" 
                        readonly
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-gray-50 font-mono text-sm focus:outline-none"
                        rows="10"
                    ></textarea>
                </div>
            </div>
        </div>
    </div>

    <script src="dist/app.js"></script>
</body>
</html>
